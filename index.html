<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Manager</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1>Contact Manager</h1>
  </header>

  <main>
    <div class="toolbar">
      <input type="text" id="search" placeholder="Search by name, email, or phone..." autocomplete="off">
      <div class="toolbar-controls">
        <select id="sort-field">
          <option value="name">Sort by Name</option>
          <option value="email">Sort by Email</option>
          <option value="createdAt">Sort by Date Added</option>
        </select>
        <select id="sort-order">
          <option value="asc">Ascending</option>
          <option value="desc">Descending</option>
        </select>
        <button id="add-btn" class="btn btn-primary">+ Add Contact</button>
      </div>
    </div>

    <div id="contact-list" class="contact-list"></div>
    <p id="empty-msg" class="empty-msg" hidden>No contacts found.</p>
  </main>

  <!-- Add/Edit Modal -->
  <div id="modal-overlay" class="modal-overlay" hidden>
    <div class="modal">
      <h2 id="modal-title">Add Contact</h2>
      <form id="contact-form" novalidate>
        <input type="hidden" id="contact-id">
        <div class="form-group photo-upload-group">
          <label>Photo <span class="hint">(max 1 MB)</span></label>
          <div class="photo-upload-area">
            <img id="photo-preview" class="photo-preview" src="" alt="" hidden>
            <div id="photo-placeholder" class="photo-placeholder">No photo</div>
            <div class="photo-buttons">
              <label class="btn btn-secondary btn-small" for="photo">Choose file</label>
              <input type="file" id="photo" accept="image/*" hidden>
              <button type="button" id="remove-photo" class="btn btn-secondary btn-small" hidden>Remove</button>
            </div>
            <span class="error" id="photo-error"></span>
          </div>
        </div>
        <div class="form-group">
          <label for="name">Name <span class="required">*</span></label>
          <input type="text" id="name" required>
          <span class="error" id="name-error"></span>
        </div>
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email">
          <span class="error" id="email-error"></span>
        </div>
        <div class="form-group">
          <label for="phone">Phone</label>
          <input type="tel" id="phone" placeholder="e.g. 123-456-7890">
          <span class="error" id="phone-error"></span>
        </div>
        <div class="form-group">
          <label for="address">Address</label>
          <input type="text" id="address">
        </div>
        <div class="form-group">
          <label for="notes">Notes</label>
          <textarea id="notes" rows="3"></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" id="cancel-btn" class="btn btn-secondary">Cancel</button>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Delete Confirmation Dialog -->
  <div id="confirm-overlay" class="modal-overlay" hidden>
    <div class="modal modal-confirm">
      <h2>Delete Contact</h2>
      <p>Are you sure you want to delete this contact? This action cannot be undone.</p>
      <div class="modal-actions">
        <button id="confirm-cancel" class="btn btn-secondary">Cancel</button>
        <button id="confirm-delete" class="btn btn-danger">Delete</button>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
